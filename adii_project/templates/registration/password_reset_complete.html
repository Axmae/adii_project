{% extends 'base.html' %}
{% block title %}Mot de passe réinitialisé — ADII{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box" style="max-width:440px;text-align:center">
    <div class="auth-header">
      <h1 style="font-size:1.5rem;font-weight:700;margin-top:16px">✅ Mot de passe réinitialisé</h1>
    </div>
    <p style="color:var(--text-muted);font-size:.875rem;line-height:1.6;margin:16px 0">
      Votre mot de passe a été modifié avec succès.
    </p>
    <a href="{% url 'auth' %}" class="btn btn-primary" style="margin-top:8px">Se connecter</a>
  </div>
</div>
{% endblock %}
